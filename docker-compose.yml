services:
    db:
        container_name: multix_test_db
        image: postgres:18-alpine
        environment:
            POSTGRES_DB: postgres
            POSTGRES_PASSWORD: postgres
        shm_size: 1gb
        ports:
            - '5432:5432'
        command: |
            postgres -c log_statement=all
        volumes:
            - ./data/db:/var/lib/postgresql
